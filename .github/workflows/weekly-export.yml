name: Weekly Excel Export

on:
  schedule:
    - cron: '0 8 * * 5'  # Friday 08:00 UTC = 18:00 AEST (UTC+10)
  workflow_dispatch:      # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xlsx
        run: npm install xlsx

      - name: Generate Excel export
        run: node scripts/generate_export.js

      - name: Commit and push export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/
          git diff --staged --quiet || (git commit -m "Weekly export $(date +%Y-%m-%d)" && git push)
